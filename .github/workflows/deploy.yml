name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments; don't cancel in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    if: contains(github.event.head_commit.message, 'deploy:') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build .env file
        run: |
          cat > .env << 'EOF'
          PUBLIC_POSTHOG_KEY=${{ vars.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_API_HOST=${{ vars.PUBLIC_POSTHOG_API_HOST }}
          PUBLIC_POSTHOG_UI_HOST=${{ vars.PUBLIC_POSTHOG_UI_HOST }}
          PUBLIC_HUBSPOT_PORTAL_ID=${{ vars.PUBLIC_HUBSPOT_PORTAL_ID }}
          PUBLIC_HUBSPOT_FORM_ID=${{ vars.PUBLIC_HUBSPOT_FORM_ID }}
          PUBLIC_WHATSAPP_NUMBER=${{ vars.PUBLIC_WHATSAPP_NUMBER }}
          PUBLIC_CONTACT_EMAIL=${{ vars.PUBLIC_CONTACT_EMAIL }}
          EOF

      - run: bun run build
        env:
          SITE_URL: https://www.alimentosnewyork.com

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
